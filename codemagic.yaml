workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios

      - name: Init Capacitor
        script: |
          npx cap init checklistapp com.checklist.app

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Copy build
        script: |
          npx cap copy

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
          -scheme App \
          -configuration Debug \
          -sdk iphoneos \
          build

    artifacts:
      - ios/App/build/**/*.ipa