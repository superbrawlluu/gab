workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps || true

      # 🔥 CREA DIST
      - name: Create dist FIRST
        script: |
          rm -rf dist
          mkdir dist
          cp -r client/* dist/

          if [ ! -f dist/index.html ]; then
            echo "ERRORE: index.html non trovato!"
            exit 1
          fi

      # 🔥 CREA CONFIG CAPACITOR CON iOS 15
      - name: Create capacitor config
        script: |
          echo '{
            "appId": "com.checklist.app",
            "appName": "checklistapp",
            "webDir": "dist",
            "server": {
              "iosScheme": "https"
            },
            "ios": {
              "minVersion": "15.0"
            }
          }' > capacitor.config.json

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps

      # 🔥 ORA NON FALLISCE
      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.app