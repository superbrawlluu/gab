workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      # 🔥 BUILD INTELLIGENTE
      - name: Build web app (auto detect)
        script: |
          echo "Avvio build..."
          npm run build || true

          echo "Cerco index.html..."
          BUILD_DIR=$(find . -type f -name "index.html" -not -path "*/node_modules/*" | head -n 1 | xargs dirname)

          echo "Build trovata in: $BUILD_DIR"

          if [ -z "$BUILD_DIR" ]; then
            echo "ERRORE: Nessuna build trovata"
            exit 1
          fi

          rm -rf dist
          mkdir dist
          cp -r "$BUILD_DIR"/* dist/

          echo "Contenuto dist:"
          ls dist

      - name: Setup Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps
          npx cap init checklistapp com.checklist.app --web-dir=dist || true

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Fix iOS deployment target
        script: |
          cd ios/App
          sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/' Podfile || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj || true

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.app