workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps

      - name: Init Capacitor
        script: |
          npx cap init checklistapp com.checklist.app

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Copy build
        script: |
          npx cap copy

      - name: Fix Podfile (safe)
        script: |
          cd ios/App
          echo "platform :ios, '15.0'" > Podfile
          echo "" >> Podfile
          echo "target 'App' do" >> Podfile
          echo "  capacitor_pods" >> Podfile
          echo "end" >> Podfile

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.app