workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Clean & install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps

      - name: Init Capacitor
        script: |
          npx cap init checklistapp com.checklist.app

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Copy build to iOS
        script: |
          npx cap copy

      - name: Build iOS (auto scheme, no signing)
        script: |
          cd ios/App

          echo "Lista schemes:"
          xcodebuild -list

          SCHEME=$(xcodebuild -list | grep -A 20 "Schemes:" | tail -n +2 | head -n 1 | xargs)

          echo "Uso scheme: $SCHEME"

          xcodebuild -workspace App.xcworkspace \
          -scheme "$SCHEME" \
          -configuration Debug \
          -sdk iphoneos \
          CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.app