workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Clean & install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps

      - name: Init Capacitor
        script: |
          npx cap init checklistapp com.checklist.app

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: FORCE iOS TARGET (REAL FIX)
        script: |
          cd ios/App

          echo "Fix Podfile"
          sed -i '' 's/platform :ios, .*/platform :ios, '\''14.0'\''/' Podfile || true

          echo "Fix project.pbxproj (all occurrences)"
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' App.xcodeproj/project.pbxproj || true

          echo "Fix Capacitor config"
          if [ -f App/AppDelegate.swift ]; then
            echo "iOS project detected"
          fi

      - name: Copy build to iOS
        script: |
          npx cap copy

      - name: Install CocoaPods (clean)
        script: |
          cd ios/App
          pod deintegrate || true
          pod install --repo-update

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.app