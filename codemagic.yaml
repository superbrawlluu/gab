workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Clean & install dependencies
        script: |
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps

      - name: Build web app
        script: |
          npm run build

      - name: Install Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps

      - name: Init Capacitor
        script: |
          npx cap init checklistapp com.checklist.app

      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Copy build to iOS
        script: |
          npx cap copy

      - name: Force iOS 14 (SAFE FIX)
        script: |
          cd ios/App
          sed -i '' 's/platform :ios, .*/platform :ios, '\''14.0'\''/' Podfile || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = .*/IPHONEOS_DEPLOYMENT_TARGET = 14.0;/g' App.xcodeproj/project.pbxproj || true

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.app