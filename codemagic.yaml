workflows:
  ios-build:
    name: iOS Build
    max_build_duration: 60

    environment:
      node: 20
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm install --legacy-peer-deps || true

      # 🔥 CREA DIST PRIMA DI TUTTO
      - name: Create dist FIRST (CRUCIALE)
        script: |
          echo "Creo dist da client..."

          rm -rf dist
          mkdir dist

          cp -r client/* dist/

          echo "Controllo dist:"
          ls dist

          if [ ! -f dist/index.html ]; then
            echo "ERRORE: index.html non trovato!"
            exit 1
          fi

      - name: Setup Capacitor
        script: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios --legacy-peer-deps
          npx cap init checklistapp com.checklist.app --web-dir=dist || true

      # 🔥 ORA FUNZIONA
      - name: Add iOS platform
        script: |
          npx cap add ios

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Fix iOS deployment target
        script: |
          cd ios/App
          sed -i '' 's/platform :ios, .*/platform :ios, '\''15.0'\''/' Podfile || true
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 15.0/g' App.xcodeproj/project.pbxproj || true

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS
        script: |
          cd ios/App
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO

    artifacts:
      - ios/App/build/**/*.app